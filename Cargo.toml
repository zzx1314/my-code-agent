[package]
name = "my-code-agent"
version = "0.1.0"
edition = "2024"

[dependencies]
rig-core = "0.35"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "signal"] }
anyhow = "1"
dotenv = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
colored = "3"
futures = "0.3"
termimad = "0.34.1"
glob = "0.3.3"

[dev-dependencies]
tempfile = "3"

