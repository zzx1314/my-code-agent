# ── My Code Agent Configuration ──
#
# This file is optional. All fields have sensible defaults.
# If config.toml doesn't exist, defaults are used silently.
# Only override the sections/values you need to change.

# ── LLM Provider Settings ──
[llm]
# Default provider: deepseek, openai, anthropic, cohere, openrouter, custom
provider = "deepseek"
# Model name: deepseek-v4-flash (default), deepseek-v4-pro, etc.
model = "deepseek-v4-flash"
# Environment variable name for the API key
api_key_env = "DEEPSEEK_API_KEY"

# Model API request timeout in seconds.
# Default: 1800 (30 minutes, for long reasoning models)
# Set to 0 to disable timeout (not recommended).
# timeout_secs = 1800

# ── File Reading / Attachment Settings ──
[files]
# Maximum lines returned by `file_read` when `limit` is not specified.
# Default: 200
# default_read_limit = 200

# Maximum lines included from a single `@filepath` attachment.
# Default: 500
# attach_max_lines = 500

# Maximum bytes included from a single `@filepath` attachment.
# Default: 51200 (50 KB)
# attach_max_bytes = 51200

# ── Context Window / Token Usage Settings ──
[context]
# Model context window size in tokens.
# Default: 1048576 (1M tokens)
# Set to 262144 for 256K context window
window_size = 1048576

# Percentage at which to warn about context usage.
# Default: 75
warn_threshold_percent = 75

# Percentage at which to issue a critical context warning.
# Default: 90
critical_threshold_percent = 90

# ── Shell Execution Settings ──
[shell]
# Default command timeout in seconds.
# Default: 30
# default_timeout_secs = 30

# ── Agent Behavior Settings ──
[agent]
# Maximum number of tool-call turns per response.
# Default: 10
max_turns = 10

# Whether to show tool call details (tool name, arguments) during streaming.
# When false (default), tool calls are hidden while the model is generating.
# Default: false
# show_tool_calls = false

# Whether to show tool call arguments and results (vs just the tool name).
# When false, only the tool name (e.g. "⚙️ file_read") is shown without arguments or results.
# Only effective when show_tool_calls is true. Default: true (show everything).
# Default: true
# show_tool_details = true


# Whether to show tool call details in the chat history after the response completes.
# When false (default), tool calls and results are hidden from completed responses.
# Set to true to inspect what tools were called after the fact.
# Default: false
# show_tool_calls_in_history = false

# ── Plan Confirmation Settings ──
[plan]
# Timeout in seconds for plan confirmation prompt.
# After this many seconds without input, the plan auto-proceeds.
# Set to 0 to disable timeout (wait indefinitely for user input).
# Default: 0 (disabled — wait indefinitely)
# timeout_secs = 5

# ── Session Persistence Settings ──
[session]
# File path for session persistence.
# Default: `.session.json` (in the current directory).
# Set to "" or omit to use the default.
# save_file = ".session.json"

# ── MCP (Parallel Search) Settings ──
[mcp]
# Enable MCP web search tools.
enabled = true

# Parallel AI API key (optional - works without for free/anonymous usage)
# Get one at https://platform.parallel.ai for higher rate limits
# Or set PARALLEL_API_KEY environment variable in .env
# parallel_api_key = ""

# ── Code Review Settings ──
[review]
# Enable code review functionality. Default: true
enabled = true

# Automatically review code after main agent completes. Default: true
auto_review = true

# Minimum lines changed to trigger auto-review. Default: 5
# threshold_lines = 5

# Maximum issues to report. Default: 50
# max_issues = 50

# Review severity threshold: "critical" | "high" | "medium" | "low"
# Only issues at or above this severity will be reported. Default: "low"
# severity_threshold = "low"
